<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EF Mining Planner — Recipes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <div class="page-header">
    <div class="logo-sym"></div>
    <h1>Recipes</h1>
    <p class="subtitle">CRAFT RECIPES <span>///</span> EVE FRONTIER</p>
  </div>

  

  <div id="recipesContent"></div>
</div>

<script src="nav.js"></script>
<script src="recipes.js"></script>
<script>
injectNav('recipes');
window.addEventListener('DOMContentLoaded', renderRecipes);

const AST_COLORS = { SLAG:'var(--accent)', COMET:'var(--blue)', CHAR:'var(--gold)' };

function renderRecipes() {
  const container = document.getElementById('recipesContent');
  let html = '';

  const card = (icon, title, sub, color, bodyHtml) => `
    <div style="margin-bottom:18px">
      <div style="font-family:'Share Tech Mono',monospace;font-size:11px;
        padding:8px 14px;background:var(--bg3);border-left:3px solid ${color};
        display:flex;justify-content:space-between;align-items:center;margin-bottom:0">
        <span style="color:#fff">${icon} ${esc(title)}</span>
        <span style="color:var(--text3);font-size:9px">${sub}</span>
      </div>
      ${bodyHtml}
    </div>`;

  const ioTable = (rows, labelIn) => `
    <div class="tbl-head" style="grid-template-columns:1fr 100px">
      <span>${labelIn}</span><span style="text-align:right">Qty</span>
    </div>
    ${rows.map(r => `
      <div class="mat-row" style="grid-template-columns:1fr 100px">
        <div class="mat-name">${esc(r.name)}</div>
        <div class="mat-qty" style="text-align:right;color:${r.color||'var(--gold2)'}">${r.qty}</div>
      </div>`).join('')}`;

  // ── Étape 4 : Produit final ──────────────────────────────────
  html += `<div class="panel cut" style="margin-bottom:24px"><div class="panel-label">STEP 4 — FINAL PRODUCT</div>`;
  for (const [, rec] of Object.entries(RECIPES)) {
    html += card('⚙', rec.name, `${rec.batch} units / batch — via ${rec.machine}`, 'var(--accent)',
      ioTable(rec.inputs.map(i => ({...i, color:'var(--gold2)'})), 'Required components'));
  }
  html += `</div>`;

  // ── Étape 3 : Composants ─────────────────────────────────────
  html += `<div class="panel cut" style="margin-bottom:24px"><div class="panel-label">STEP 3 — COMPONENTS TO CRAFT</div>`;
  for (const [name, rec] of Object.entries(COMPOSANTS)) {
    html += card('🔧', name, `${rec.batch} units / batch — via ${rec.machine}`, 'var(--accent)',
      ioTable(rec.inputs.map(i => ({...i, color:'var(--gold2)'})), 'Required raw materials'));
  }
  html += `</div>`;

  // ── Étape 2 : Intermédiaires ─────────────────────────────────
  html += `<div class="panel cut" style="margin-bottom:24px"><div class="panel-label">STEP 2 — INTERMEDIATES (REFINING)</div>`;
  for (const [name, rec] of Object.entries(INTERMEDIAIRES)) {
    html += card('⚗', name, `${rec.batch} units → via ${rec.machine}`, 'var(--blue)',
      ioTable(rec.outputs.map(o => ({...o, color:'var(--green)'})), 'Raw materials produced'));
  }
  html += `</div>`;

  // ── Étape 1 : Matrices brutes ─────────────────────────────────
  html += `<div class="panel cut" style="margin-bottom:24px"><div class="panel-label">STEP 1 — RAW MATRICES (ASTEROIDS)</div>
    <div class="tbl-head" style="grid-template-columns:1fr 80px 220px 60px">
      <span>Matrice</span><span>Asteroid</span><span>Outputs (40 units mined)</span><span style="text-align:right">Vol./u</span>
    </div>`;
  for (const [name, rec] of Object.entries(MATRICES)) {
    const col = AST_COLORS[rec.asteroid] || 'var(--text3)';
    html += `
      <div class="mat-row" style="grid-template-columns:1fr 80px 220px 60px;align-items:start;padding:10px 14px">
        <div class="mat-name">${esc(name)}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:${col}">${esc(rec.asteroid)}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green);line-height:1.8">
          ${rec.outputs.map(o => `${o.qty}× ${esc(o.name)}`).join('<br>')}
        </div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);text-align:right">${rec.volume}</div>
      </div>`;
  }
  html += `</div>`;

  container.innerHTML = html;
}
</script>
</body>
</html>
