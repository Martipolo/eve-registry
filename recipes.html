<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EF Mining Planner — Recipes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <div class="page-header">
    <div class="logo-sym"></div>
    <h1 data-i18n="recipes.title">Recipes</h1>
    <p class="subtitle"><span data-i18n="recipes.subtitle">CRAFT RECIPES /// EVE FRONTIER</span></p>
  </div>

  <!-- Sélecteur de machine -->
  <div class="panel cut" style="margin-top:14px;margin-bottom:24px;padding-top:28px">
    <div class="panel-label" data-i18n="construction.machine.label">Available machine</div>
    <div style="display:flex;align-items:center;gap:12px">
      <select id="recipeMachine" onchange="renderRecipes()"
        style="background:var(--bg3);border:1px solid var(--border);color:var(--text);
               font-family:'Share Tech Mono',monospace;font-size:12px;
               padding:8px 12px;cursor:pointer;outline:none;height:38px;flex:1;max-width:280px">
        <optgroup label="Portable">
          <option value="Field Printer">Field Printer</option>
          <option value="Field Refinery">Field Refinery</option>
        </optgroup>
        <optgroup label="Standard">
          <option value="Mini Printer" selected>Mini Printer</option>
          <option value="Printer">Printer</option>
          <option value="Refinery">Refinery</option>
          <option value="Assembler">Assembler</option>
        </optgroup>
        <optgroup label="Heavy">
          <option value="Heavy Printer">Heavy Printer</option>
          <option value="Heavy Refinery">Heavy Refinery</option>
          <option value="Mini Berth">Mini Berth</option>
          <option value="Berth">Berth</option>
          <option value="Heavy Berth">Heavy Berth</option>
        </optgroup>
        <optgroup label="Special">
          <option value="Nursery">Nursery</option>
        </optgroup>
      </select>
      <span id="recipeCount" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3)"></span>
    </div>
  </div>

  <div id="recipesContent"></div>
</div>

<script src="nav.js"></script>
<script src="recipes.js"></script>
<script>
injectNav('recipes');
document.addEventListener('langReady', renderRecipes);

const AST_COLORS = { SLAG:'var(--accent)', COMET:'var(--blue)', CHAR:'var(--gold)' };

function renderRecipes() {
  const machine   = document.getElementById('recipeMachine')?.value || 'Mini Printer';
  const container = document.getElementById('recipesContent');
  const recipes   = getRecipesForMachine(machine);
  let html = '';

  const card = (icon, title, sub, color, bodyHtml) => `
    <div style="margin-bottom:18px">
      <div style="font-family:'Share Tech Mono',monospace;font-size:11px;
        padding:8px 14px;background:var(--bg3);border-left:3px solid ${color};
        display:flex;justify-content:space-between;align-items:center;margin-bottom:0">
        <span style="color:#fff">${icon} ${esc(title)}</span>
        <span style="color:var(--text3);font-size:9px">${sub}</span>
      </div>
      ${bodyHtml}
    </div>`;

  const ioTable = (rows, labelIn) => `
    <div class="tbl-head" style="grid-template-columns:1fr 100px">
      <span>${labelIn}</span><span style="text-align:right">${t('recipes.col.qty')}</span>
    </div>
    ${rows.map(r => `
      <div class="mat-row" style="grid-template-columns:1fr 100px">
        <div class="mat-name">${esc(r.name)}</div>
        <div class="mat-qty" style="text-align:right;color:${r.color||'var(--gold2)'}">${r.qty}</div>
      </div>`).join('')}`;

  const sorted = Object.entries(recipes).sort(([,a],[,b]) => a.name.localeCompare(b.name));

  document.getElementById('recipeCount').textContent = `${sorted.length} recipes`;

  if (sorted.length === 0) {
    container.innerHTML = `<div class="empty"><div class="icon">◧</div><div>No recipes for this machine</div></div>`;
    return;
  }

  html += `<div class="panel cut" style="margin-bottom:24px"><div class="panel-label">${esc(machine.toUpperCase())} — RECIPES</div>`;
  for (const [key, rec] of sorted) {
    html += card('⚙', rec.name,
      `${rec.batch} ${t('recipes.batch')} — ${t('recipes.via')} ${rec.machine}`,
      'var(--accent)',
      ioTable(rec.inputs.map(i => ({...i, color:'var(--gold2)'})), t('recipes.col.input')));
  }
  html += `</div>`;

  // Matrices
  html += `<div class="panel cut" style="margin-bottom:24px"><div class="panel-label">${t('recipes.step1')}</div>
    <div class="tbl-head" style="grid-template-columns:1fr 80px 220px 60px">
      <span>${t('recipes.col.matrix')}</span>
      <span>${t('recipes.col.asteroid')}</span>
      <span>${t('recipes.col.outputs')}</span>
      <span style="text-align:right">${t('recipes.col.volume')}</span>
    </div>`;
  for (const [name, rec] of Object.entries(MATRICES)) {
    const col = AST_COLORS[rec.asteroid] || 'var(--text3)';
    html += `
      <div class="mat-row" style="grid-template-columns:1fr 80px 220px 60px;align-items:start;padding:10px 14px">
        <div class="mat-name">${esc(name)}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:${col}">${esc(rec.asteroid)}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green);line-height:1.8">
          ${rec.outputs.map(o => `${o.qty}× ${esc(o.name)}`).join('<br>')}
        </div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);text-align:right">${rec.volume}</div>
      </div>`;
  }
  html += `</div>`;

  container.innerHTML = html;
}
</script>
  <footer>
    <div>Blockchain: <span>Sui Testnet</span> &nbsp;·&nbsp; EVE World <span>v0.0.18</span></div>
    <div style="margin-top:4px;opacity:.5" data-i18n="footer.unofficial">EF Mining Planner — Unofficial community tool · Not affiliated with CCP Games</div>
    <div style="margin-top:6px;font-size:9px;letter-spacing:2px">
      Built by <a href="index.html" style="color:var(--accent);text-decoration:none;letter-spacing:2px" title="Find Ekno in the Registry">EKNO</a>
      <span style="opacity:.4"> · EVE Frontier</span>
      &nbsp;·&nbsp;
      <a href="https://ko-fi.com/efminingplanner" target="_blank" style="color:var(--gold);text-decoration:none;letter-spacing:1px">🍺 Buy me a beer</a>
    </div>
  </footer>
</body>
</html>
